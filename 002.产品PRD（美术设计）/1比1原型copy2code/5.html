<script>
        // Subtle floating interaction for the card
        const card = document.querySelector('.bg-surface-white');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 100;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 100;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Background bubble movement
        const bubbles = document.querySelectorAll('.floating-bubble');
        bubbles.forEach((bubble, index) => {
            let posX = 0;
            let posY = 0;
            let speedX = (index + 1) * 0.2;
            let speedY = (index + 1) * 0.15;

            function animate() {
                posX += speedX;
                posY += speedY;
                
                if (posX > 50 || posX < -50) speedX *= -1;
                if (posY > 50 || posY < -50) speedY *= -1;

                bubble.style.transform = `translate(${posX}px, ${posY}px)`;
                requestAnimationFrame(animate);
            }
            animate();
        });
    </script>
