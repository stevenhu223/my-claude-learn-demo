<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .squishy-active:active {
            transform: scale(0.98);
            transition: transform 0.1s cubic-bezier(0, 0, 0.2, 1);
        }
        .soft-glow-focus:focus-within {
            box-shadow: 0 0 0 4px rgba(255, 158, 170, 0.1);
        }
        body {
            background-color: #FFF5F7;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        .gradient-brand {
            background: linear-gradient(135deg, #FFF5F7 0%, #FF9EAA 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container": "#efeded",
                      "on-secondary-fixed-variant": "#6b3741",
                      "error-container": "#ffdad6",
                      "surface-container-low": "#f5f3f3",
                      "outline-variant": "#d9c1c2",
                      "on-error": "#ffffff",
                      "primary": "#944652",
                      "surface-container-highest": "#e4e2e2",
                      "primary-fixed-dim": "#ffb2ba",
                      "on-primary": "#ffffff",
                      "on-secondary-fixed": "#360c17",
                      "tertiary-fixed": "#ffd9dd",
                      "income-green": "#7DD87D",
                      "primary-container": "#ff9eaa",
                      "on-secondary-container": "#7b444e",
                      "tertiary-container": "#ff9ead",
                      "inverse-primary": "#ffb2ba",
                      "on-surface": "#1b1c1c",
                      "secondary-fixed": "#ffd9de",
                      "secondary-container": "#ffb6c1",
                      "on-surface-variant": "#534344",
                      "primary-fixed": "#ffd9dc",
                      "on-tertiary-container": "#90143a",
                      "on-primary-fixed-variant": "#762f3b",
                      "tertiary": "#ad2c4e",
                      "on-primary-container": "#7a323e",
                      "surface": "#fbf9f8",
                      "on-background": "#1b1c1c",
                      "tertiary-fixed-dim": "#ffb2bd",
                      "on-primary-fixed": "#3e0312",
                      "text-secondary": "#999999",
                      "error": "#ba1a1a",
                      "surface-white": "#FFFFFF",
                      "on-secondary": "#ffffff",
                      "surface-tint": "#944652",
                      "background-blush": "#FFF5F7",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-fixed-variant": "#8c1037",
                      "outline": "#867274",
                      "surface-container-high": "#eae8e7",
                      "background": "#fbf9f8",
                      "surface-variant": "#e4e2e2",
                      "on-tertiary": "#ffffff",
                      "secondary-fixed-dim": "#fcb3be",
                      "surface-bright": "#fbf9f8",
                      "secondary": "#874e58",
                      "on-tertiary-fixed": "#400013",
                      "inverse-surface": "#303030",
                      "surface-dim": "#dbd9d9",
                      "inverse-on-surface": "#f2f0f0",
                      "on-error-container": "#93000a"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "xxl": "24px",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-sm": "8px",
                      "stack-lg": "24px",
                      "base": "4px",
                      "stack-md": "16px",
                      "margin-mobile": "20px",
                      "gutter": "12px"
              },
              "fontFamily": {
                      "title-sm": ["Be Vietnam Pro"],
                      "headline-md": ["Be Vietnam Pro"],
                      "label-amount": ["JetBrains Mono"],
                      "label-sm": ["Be Vietnam Pro"],
                      "display-lg": ["Be Vietnam Pro"],
                      "body-md": ["Be Vietnam Pro"]
              },
              "fontSize": {
                      "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "label-amount": ["20px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
</head>
<body class="min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<div class="flex flex-col lg:flex-row min-h-screen">
<!-- Left Side: Branding (50%) -->
<section class="lg:w-1/2 gradient-brand flex flex-col items-center justify-center p-12 relative overflow-hidden">
<!-- Decorative shapes -->
<div class="absolute top-0 left-0 w-64 h-64 bg-white/20 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 animate-pulse"></div>
<div class="absolute bottom-0 right-0 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl translate-x-1/3 translate-y-1/3 animate-pulse" style="animation-delay: 1s;"></div>
<div class="relative z-10 text-center animate-in fade-in slide-in-from-bottom-8 duration-1000">
<div class="w-24 h-24 lg:w-32 lg:h-32 bg-white rounded-3xl flex items-center justify-center shadow-[0_20px_50px_rgba(148,70,82,0.15)] mx-auto mb-8">
<span class="material-symbols-outlined text-[48px] lg:text-[64px] text-primary" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-display-lg text-4xl lg:text-5xl text-on-primary-fixed-variant mb-4">财务管家</h1>
<p class="font-body-md text-lg text-on-primary-fixed-variant/70 max-w-md mx-auto leading-relaxed">
                    遇见更有温度的理财生活<br>
                    让每一分钱都有它温柔的归宿
                </p>
</div>
<div class="absolute bottom-12 text-center hidden lg:block">
<p class="font-label-sm text-on-primary-fixed-variant/40">© 2024 财务管家 - 您的贴心财务伴侣</p>
</div>
</section>
<!-- Right Side: Login Form (50%) -->
<section class="lg:w-1/2 bg-white flex flex-col items-center justify-center p-8 md:p-16 lg:p-24">
<main class="w-full max-w-[440px] animate-in fade-in zoom-in duration-700">
<!-- Mobile Logo (Visible only on small screens) -->
<div class="lg:hidden flex flex-col items-center mb-12">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center shadow-lg mb-4">
<span class="material-symbols-outlined text-[32px] text-white" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h2 class="font-headline-md text-on-surface-variant">财务管家</h2>
</div>
<!-- Form Header -->
<div class="mb-10">
<h2 class="font-display-lg text-2xl lg:text-3xl text-on-surface tracking-tight">欢迎回来</h2>
<p class="font-body-md text-on-surface-variant/60 mt-2">请登录您的账户以管理您的财务</p>
</div>
<!-- Form Content -->
<form class="space-y-6" onsubmit="return false">
<!-- Username Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant font-semibold tracking-wide uppercase">用户名 / 手机号</label>
<div class="relative group soft-glow-focus rounded-xl">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/40 text-[20px]">person</span>
</div>
<input class="w-full pl-11 pr-4 py-4 bg-surface-container-low border border-transparent focus:border-primary-container focus:bg-white focus:ring-0 rounded-xl font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30 transition-all outline-none" placeholder="请输入您的账号" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant font-semibold tracking-wide uppercase">登录密码</label>
<div class="relative group soft-glow-focus rounded-xl">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/40 text-[20px]">lock</span>
</div>
<input class="w-full pl-11 pr-11 py-4 bg-surface-container-low border border-transparent focus:border-primary-container focus:bg-white focus:ring-0 rounded-xl font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30 transition-all outline-none" placeholder="请输入您的密码" type="password">
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant/40 hover:text-primary transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer appearance-none w-5 h-5 border border-outline-variant rounded-md checked:bg-primary-container checked:border-primary-container transition-all cursor-pointer" type="checkbox">
<span class="material-symbols-outlined absolute text-white text-[16px] opacity-0 peer-checked:opacity-100 left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none" style="font-variation-settings: &quot;FILL&quot; 1;">记住我</span>
</div>
<span class="font-label-sm text-on-surface-variant group-hover:text-primary transition-colors">记住我</span>
</label>
<a class="font-label-sm text-primary font-semibold hover:text-on-tertiary-container transition-all" href="#">忘记密码？</a>
</div>
<!-- Primary Login Button -->
<button class="squishy-active w-full py-4 bg-primary-container text-white font-title-sm text-title-sm rounded-xl shadow-[0_10px_25px_rgba(255,158,170,0.4)] hover:shadow-[0_15px_30px_rgba(255,158,170,0.5)] hover:opacity-95 transition-all relative overflow-hidden group mt-4" id="loginButton" type="submit">
<span class="relative z-10">立即登录</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<!-- Register Footer -->
<div class="pt-8 text-center">
<p class="font-label-sm text-on-surface-variant/60">
                            还没有账号？
                            <a class="text-primary font-bold hover:underline ml-1" href="#">立即注册</a>
</p>
</div>
</form>
<!-- Divider Decorative -->
<div class="mt-12 flex items-center gap-4 w-full opacity-10">
<div class="h-px bg-on-surface-variant flex-1"></div>
<div class="w-1.5 h-1.5 rounded-full bg-on-surface-variant"></div>
<div class="h-px bg-on-surface-variant flex-1"></div>
</div>
<!-- Footer for Mobile -->
<footer class="mt-8 text-center lg:hidden">
<p class="font-label-sm text-on-surface-variant/40 leading-relaxed">
                        © 2024 财务管家 - 您的贴心财务伴侣
                    </p>
</footer>
</main>
</section>
</div>
<script>
        // Simple micro-interaction for button feedback
        const loginBtn = document.getElementById('loginButton');
        loginBtn.addEventListener('click', function(e) {
            const ripple = document.createElement('div');
            ripple.classList.add('absolute', 'bg-white/30', 'rounded-full', 'animate-ping');
            ripple.style.width = '20px';
            ripple.style.height = '20px';
            ripple.style.left = (e.clientX - this.getBoundingClientRect().left) + 'px';
            ripple.style.top = (e.clientY - this.getBoundingClientRect().top) + 'px';
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1000);
        });

        // Toggle Password Visibility
        const togglePass = document.getElementById('togglePassword');
        const passInput = document.querySelector('input[type="password"]');
        let isVisible = false;
        
        togglePass.addEventListener('click', () => {
            isVisible = !isVisible;
            passInput.type = isVisible ? 'text' : 'password';
            togglePass.querySelector('span').innerText = isVisible ? 'visibility_off' : 'visibility';
        });
    </script>


</body></html>
