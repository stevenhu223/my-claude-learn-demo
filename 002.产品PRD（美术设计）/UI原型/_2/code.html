<script>
        /**
         * Toggles the visibility of a password input and updates the icon
         * @param {string} inputId - ID of the input element
         * @param {string} iconId - ID of the icon span element
         */
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility_off';
            }
        }

        // Add a simple tactile interaction to the button via JS for that extra "squishy" feel
        const btn = document.querySelector('.squishy-button');
        if (btn) {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.95)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'scale(1)';
            });
        }
    </script>
