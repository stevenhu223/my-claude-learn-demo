<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-tab {
            font-variation-settings: 'FILL' 1;
        }
        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Tactile button effect */
        .btn-press:active { transform: scale(0.98); opacity: 0.9; }
        
        .category-chip.active {
            background-color: #ffb6c1;
            color: #7b444e;
            box-shadow: 0 4px 12px rgba(255, 158, 170, 0.2);
        }
        
        .num-key:active { background-color: #ffdae0; }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(148, 70, 82, 0.2);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "income-green": "#7DD87D",
                        "secondary-fixed": "#ffd9de",
                        "surface-variant": "#e4e2e2",
                        "on-tertiary-container": "#90143a",
                        "surface-white": "#FFFFFF",
                        "primary": "#944652",
                        "on-background": "#1b1c1c",
                        "on-tertiary-fixed-variant": "#8c1037",
                        "on-secondary-container": "#7b444e",
                        "secondary": "#874e58",
                        "background": "#fbf9f8",
                        "tertiary-fixed-dim": "#ffb2bd",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#ad2c4e",
                        "outline": "#867274",
                        "outline-variant": "#d9c1c2",
                        "tertiary-container": "#ff9ead",
                        "surface-container-high": "#eae8e7",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#6b3741",
                        "surface-container-highest": "#e4e2e2",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#534344",
                        "inverse-on-surface": "#f2f0f0",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#ffb2ba",
                        "surface": "#fbf9f8",
                        "on-primary-container": "#7a323e",
                        "on-primary-fixed": "#3e0312",
                        "inverse-surface": "#303030",
                        "tertiary-fixed": "#ffd9dd",
                        "surface-dim": "#dbd9d9",
                        "secondary-fixed-dim": "#fcb3be",
                        "secondary-container": "#ffb6c1",
                        "background-blush": "#FFF5F7",
                        "on-secondary-fixed": "#360c17",
                        "on-primary-fixed-variant": "#762f3b",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#ffd9dc",
                        "on-surface": "#1b1c1c",
                        "primary-container": "#ff9eaa",
                        "surface-container": "#efeded",
                        "surface-container-low": "#f5f3f3",
                        "inverse-primary": "#ffb2ba",
                        "on-tertiary-fixed": "#400013",
                        "error": "#ba1a1a",
                        "surface-bright": "#fbf9f8",
                        "surface-tint": "#944652",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "text-secondary": "#999999"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "gutter": "12px",
                        "stack-lg": "24px",
                        "base": "4px",
                        "stack-md": "16px",
                        "margin-mobile": "20px"
                    },
                    "fontFamily": {
                        "headline-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "title-sm": ["Be Vietnam Pro"],
                        "display-lg": ["Be Vietnam Pro"],
                        "label-amount": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-amount": ["28px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background-blush min-h-screen text-on-surface flex items-center justify-center p-6 sm:p-12">
<!-- Main Desktop Card Container -->
<main class="w-full max-w-[1000px] bg-surface-white rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[700px]">
<!-- Left Panel: Large Amount Display & Quick Switcher -->
<aside class="md:w-[40%] bg-surface flex flex-col items-center justify-center p-12 border-r border-outline-variant/30">
<button class="self-start mb-auto w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface-variant btn-press hover:bg-surface-container-high">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="w-full text-center py-12">
<div class="bg-surface-container-high p-1.5 rounded-full inline-flex gap-1 mb-10 shadow-inner">
<button class="px-10 py-3 rounded-full font-title-sm text-title-sm transition-all duration-300 bg-primary-container text-on-primary-container shadow-sm" id="tab-expense">支出</button>
<button class="px-10 py-3 rounded-full font-title-sm text-title-sm transition-all duration-300 text-on-surface-variant hover:text-primary" id="tab-income">收入</button>
</div>
<p class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest mb-4">当前金额</p>
<div class="flex items-center justify-center gap-2">
<span class="text-headline-md font-headline-md text-primary" id="currency-symbol">¥</span>
<span class="text-[64px] font-label-amount text-primary leading-tight tracking-tight" id="amount-display">0.00</span>
</div>
</div>
<div class="mt-auto w-full">
<!-- Secondary Number Pad (Integrated/Smaller) -->
<div class="grid grid-cols-4 gap-2 opacity-80 scale-90 origin-bottom">
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="appendNum('1')">1</button>
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="appendNum('2')">2</button>
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="appendNum('3')">3</button>
<button class="h-12 bg-secondary-container/30 text-on-secondary-container rounded-xl flex items-center justify-center btn-press" onclick="backspace()">
<span class="material-symbols-outlined text-xl" data-icon="backspace">backspace</span>
</button>
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="appendNum('4')">4</button>
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="appendNum('5')">5</button>
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="appendNum('6')">6</button>
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="clearAll()">C</button>
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="appendNum('7')">7</button>
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="appendNum('8')">8</button>
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="appendNum('9')">9</button>
<button class="num-key h-12 bg-background-blush rounded-xl font-label-amount text-on-surface btn-press" onclick="appendNum('0')">0</button>
</div>
</div>
</aside>
<!-- Right Panel: Detailed Form -->
<section class="flex-1 p-10 md:p-12 flex flex-col gap-8 overflow-y-auto no-scrollbar">
<!-- Section: Category -->
<div>
<div class="flex items-center justify-between mb-6">
<h3 class="font-headline-md text-headline-md text-on-surface">选择分类</h3>
<span class="text-label-sm text-on-surface-variant">共 8 个常用分类</span>
</div>
<div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="category-grid">
<button class="category-chip active flex items-center gap-3 p-4 rounded-2xl bg-background-blush transition-all btn-press border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined text-2xl" data-icon="restaurant">restaurant</span>
<span class="text-[15px] font-title-sm">餐饮</span>
</button>
<button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined text-2xl" data-icon="directions_car">directions_car</span>
<span class="text-[15px] font-title-sm">交通</span>
</button>
<button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined text-2xl" data-icon="shopping_bag">shopping_bag</span>
<span class="text-[15px] font-title-sm">购物</span>
</button>
<button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined text-2xl" data-icon="home">home</span>
<span class="text-[15px] font-title-sm">居住</span>
</button>
<button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined text-2xl" data-icon="styler">styler</span>
<span class="text-[15px] font-title-sm">服饰</span>
</button>
<button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined text-2xl" data-icon="theater_comedy">theater_comedy</span>
<span class="text-[15px] font-title-sm">娱乐</span>
</button>
<button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined text-2xl" data-icon="medical_services">medical_services</span>
<span class="text-[15px] font-title-sm">医疗</span>
</button>
<button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined text-2xl" data-icon="more_horiz">more_horiz</span>
<span class="text-[15px] font-title-sm">更多</span>
</button>
</div>
</div>
<div class="h-px bg-outline-variant/30"></div>
<!-- Section: Transaction Details -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-2">
<label class="block font-title-sm text-title-sm text-on-surface ml-1">交易日期</label>
<div class="relative bg-background border border-outline-variant rounded-2xl px-5 py-4 flex items-center gap-3 focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-primary" data-icon="calendar_today">calendar_today</span>
<input class="bg-transparent border-none p-0 focus:ring-0 w-full font-body-md text-on-surface" type="date" value="2023-11-24">
</div>
</div>
<div class="space-y-2">
<label class="block font-title-sm text-title-sm text-on-surface ml-1">支付方式</label>
<div class="relative bg-background border border-outline-variant rounded-2xl px-5 py-4 flex items-center gap-3 focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-primary" data-icon="account_balance_wallet">account_balance_wallet</span>
<select class="bg-transparent border-none p-0 focus:ring-0 w-full font-body-md text-on-surface appearance-none cursor-pointer">
<option>支付宝</option>
<option>微信支付</option>
<option>现金</option>
<option>银行卡</option>
</select>
</div>
</div>
</div>
<div class="space-y-2">
<label class="block font-title-sm text-title-sm text-on-surface ml-1">备注说明</label>
<div class="bg-background border border-outline-variant rounded-2xl px-5 py-4 flex items-start gap-3 focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-primary mt-0.5" data-icon="notes">notes</span>
<textarea class="bg-transparent border-none p-0 focus:ring-0 w-full font-body-md text-on-surface h-24 resize-none" placeholder="为这笔交易写点什么吧..."></textarea>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-auto pt-6 flex gap-4">
<button class="flex-1 py-5 rounded-2xl font-headline-md text-headline-md text-on-surface-variant bg-surface-container hover:bg-surface-dim transition-all btn-press">
                取消
            </button>
<button class="flex-[2] bg-primary text-white py-5 rounded-2xl font-headline-md text-headline-md shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all btn-press flex items-center justify-center gap-2" onclick="submit()">
<span class="material-symbols-outlined" data-icon="save">save</span>
                保存账单
            </button>
</div>
</section>
<!-- Visual Decoration -->
<div class="absolute -top-40 -left-40 w-96 h-96 bg-secondary-fixed/20 rounded-full blur-[120px] pointer-events-none -z-10"></div>
<div class="absolute -bottom-40 -right-40 w-80 h-80 bg-primary-fixed/20 rounded-full blur-[100px] pointer-events-none -z-10"></div>
</main>
<script>
    let currentAmount = "0.00";
    const display = document.getElementById('amount-display');
    const expenseBtn = document.getElementById('tab-expense');
    const incomeBtn = document.getElementById('tab-income');
    const categories = document.querySelectorAll('.category-chip');

    function appendNum(num) {
        if (currentAmount === "0.00") {
            currentAmount = num === "." ? "0." : num;
        } else {
            if (num === "." && currentAmount.includes(".")) return;
            if (currentAmount.includes(".") && currentAmount.split(".")[1].length >= 2) return;
            currentAmount += num;
        }
        updateDisplay();
    }

    function backspace() {
        if (currentAmount.length <= 1 || (currentAmount.length === 4 && currentAmount === "0.00")) {
            currentAmount = "0.00";
        } else {
            currentAmount = currentAmount.slice(0, -1);
            if (currentAmount.endsWith(".")) currentAmount = currentAmount.slice(0, -1);
            if (currentAmount === "") currentAmount = "0.00";
        }
        updateDisplay();
    }

    function clearAll() {
        currentAmount = "0.00";
        updateDisplay();
    }

    function updateDisplay() {
        display.innerText = currentAmount;
    }

    function submit() {
        alert('账单已保存: ¥' + currentAmount);
    }

    // Tab Switching Logic
    expenseBtn.addEventListener('click', () => {
        expenseBtn.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
        expenseBtn.classList.remove('text-on-surface-variant');
        incomeBtn.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
        incomeBtn.classList.add('text-on-surface-variant');
        document.getElementById('currency-symbol').classList.replace('text-income-green', 'text-primary');
        display.classList.replace('text-income-green', 'text-primary');
    });

    incomeBtn.addEventListener('click', () => {
        incomeBtn.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
        incomeBtn.classList.remove('text-on-surface-variant');
        expenseBtn.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
        expenseBtn.classList.add('text-on-surface-variant');
        document.getElementById('currency-symbol').classList.add('text-income-green');
        document.getElementById('currency-symbol').classList.remove('text-primary');
        display.classList.add('text-income-green');
        display.classList.remove('text-primary');
    });

    // Category Selection Logic
    categories.forEach(btn => {
        btn.addEventListener('click', () => {
            categories.forEach(b => {
                b.classList.remove('active', 'bg-primary-container', 'text-on-primary-container');
                b.classList.add('bg-background-blush', 'text-on-surface-variant');
            });
            btn.classList.add('active');
            btn.classList.remove('bg-background-blush', 'text-on-surface-variant');
        });
    });

    // Handle Keyboard Inputs
    window.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9' || e.key === '.') {
            appendNum(e.key);
        } else if (e.key === 'Backspace') {
            backspace();
        } else if (e.key === 'Enter') {
            submit();
        } else if (e.key === 'Escape') {
            clearAll();
        }
    });
</script>
</body></html>
