<script>
        // Simple micro-interaction for the button
        document.querySelector('button').addEventListener('click', function(e) {
            const btn = e.currentTarget;
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 发送中...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> 验证码已发送';
                btn.classList.remove('bg-primary-container');
                btn.classList.add('bg-income-green');
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    btn.classList.add('bg-primary-container');
                    btn.classList.remove('bg-income-green');
                }, 3000);
            }, 1500);
        });
    </script>
