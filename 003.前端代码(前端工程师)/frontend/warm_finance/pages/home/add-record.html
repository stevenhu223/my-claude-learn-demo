<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>记账 - 财务管家</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#944652",
            "primary-container": "#ff9eaa",
            "on-primary": "#ffffff",
            "on-primary-container": "#7a323e",
            "income-green": "#7DD87D",
            "error": "#ba1a1a",
            "surface-white": "#FFFFFF",
            "background-blush": "#FFF5F7",
            "text-secondary": "#999999",
            "on-surface": "#1b1c1c",
            "on-surface-variant": "#534344",
            "outline-variant": "#d9c1c2",
            "secondary-container": "#ffb6c1",
            "surface-container-low": "#f5f3f3",
            "surface-container": "#efeded"
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #FFF5F7; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .category-chip.active { background-color: #ffb6c1; color: #7b444e; box-shadow: 0 4px 12px rgba(255, 158, 170, 0.2); }
    .btn-press:active { transform: scale(0.98); }
    .num-key:active { background-color: #ffdae0; }
  </style>
</head>
<body class="bg-background-blush min-h-screen text-on-surface flex items-center justify-center p-6 sm:p-12">
  <main class="w-full max-w-[1000px] bg-surface-white rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[700px]">
    <!-- Left Panel: Amount -->
    <aside class="md:w-[40%] bg-surface flex flex-col items-center justify-center p-12 border-r border-outline-variant/30">
      <a href="index.html" class="self-start mb-auto w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high btn-press">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>

      <div class="w-full text-center py-12">
        <div class="bg-surface-container-high p-1.5 rounded-full inline-flex gap-1 mb-10 shadow-inner">
          <button class="px-10 py-3 rounded-full font-title-sm transition-all bg-primary-container text-on-primary-container shadow-sm" id="tab-expense">支出</button>
          <button class="px-10 py-3 rounded-full font-title-sm transition-all text-on-surface-variant hover:text-primary" id="tab-income">收入</button>
        </div>
        <p class="text-label-sm uppercase tracking-widest mb-4">当前金额</p>
        <div class="flex items-center justify-center gap-2">
          <span class="text-headline-md text-primary">¥</span>
          <span class="text-[64px] font-label-amount text-primary leading-tight tracking-tight" id="amount-display">0.00</span>
        </div>
      </div>

      <div class="mt-auto w-full">
        <div class="grid grid-cols-4 gap-2 opacity-80 scale-90 origin-bottom">
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="appendNum('1')">1</button>
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="appendNum('2')">2</button>
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="appendNum('3')">3</button>
          <button class="h-12 bg-secondary-container/30 rounded-xl flex items-center justify-center btn-press" onclick="backspace()">
            <span class="material-symbols-outlined text-xl">backspace</span>
          </button>
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="appendNum('4')">4</button>
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="appendNum('5')">5</button>
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="appendNum('6')">6</button>
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="clearAll()">C</button>
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="appendNum('7')">7</button>
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="appendNum('8')">8</button>
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="appendNum('9')">9</button>
          <button class="num-key h-12 bg-background-blush rounded-xl font-label-amount btn-press" onclick="appendNum('0')">0</button>
        </div>
      </div>
    </aside>

    <!-- Right Panel: Form -->
    <section class="flex-1 p-10 md:p-12 flex flex-col gap-8 overflow-y-auto">
      <div>
        <h3 class="font-headline-md text-headline-md text-on-surface mb-6">选择分类</h3>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="category-grid">
          <button class="category-chip active flex items-center gap-3 p-4 rounded-2xl bg-background-blush transition-all btn-press border border-transparent hover:border-outline-variant">
            <span class="material-symbols-outlined text-2xl">restaurant</span>
            <span class="text-[15px] font-title-sm">餐饮</span>
          </button>
          <button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
            <span class="material-symbols-outlined text-2xl">directions_car</span>
            <span class="text-[15px] font-title-sm">交通</span>
          </button>
          <button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
            <span class="material-symbols-outlined text-2xl">shopping_bag</span>
            <span class="text-[15px] font-title-sm">购物</span>
          </button>
          <button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
            <span class="material-symbols-outlined text-2xl">home</span>
            <span class="text-[15px] font-title-sm">居住</span>
          </button>
          <button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
            <span class="material-symbols-outlined text-2xl">styler</span>
            <span class="text-[15px] font-title-sm">服饰</span>
          </button>
          <button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
            <span class="material-symbols-outlined text-2xl">theater_comedy</span>
            <span class="text-[15px] font-title-sm">娱乐</span>
          </button>
          <button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
            <span class="material-symbols-outlined text-2xl">medical_services</span>
            <span class="text-[15px] font-title-sm">医疗</span>
          </button>
          <button class="category-chip flex items-center gap-3 p-4 rounded-2xl bg-background-blush text-on-surface-variant transition-all btn-press border border-transparent hover:border-outline-variant">
            <span class="material-symbols-outlined text-2xl">more_horiz</span>
            <span class="text-[15px] font-title-sm">更多</span>
          </button>
        </div>
      </div>

      <div class="h-px bg-outline-variant/30"></div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-2">
          <label class="block font-title-sm text-on-surface ml-1">交易日期</label>
          <div class="bg-background border border-outline-variant rounded-2xl px-5 py-4 flex items-center gap-3">
            <span class="material-symbols-outlined text-primary">calendar_today</span>
            <input class="bg-transparent border-none p-0 w-full font-body-md text-on-surface" type="date" value="2024-05-28">
          </div>
        </div>
        <div class="space-y-2">
          <label class="block font-title-sm text-on-surface ml-1">支付方式</label>
          <div class="bg-background border border-outline-variant rounded-2xl px-5 py-4 flex items-center gap-3">
            <span class="material-symbols-outlined text-primary">account_balance_wallet</span>
            <select class="bg-transparent border-none p-0 w-full font-body-md text-on-surface appearance-none cursor-pointer">
              <option>支付宝</option>
              <option>微信支付</option>
              <option>现金</option>
              <option>银行卡</option>
            </select>
          </div>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block font-title-sm text-on-surface ml-1">备注说明</label>
        <div class="bg-background border border-outline-variant rounded-2xl px-5 py-4 flex items-start gap-3">
          <span class="material-symbols-outlined text-primary mt-0.5">notes</span>
          <textarea class="bg-transparent border-none p-0 w-full font-body-md text-on-surface h-24 resize-none" placeholder="为这笔交易写点什么吧..."></textarea>
        </div>
      </div>

      <div class="mt-auto pt-6 flex gap-4">
        <a href="index.html" class="flex-1 py-5 rounded-2xl font-headline-md text-on-surface-variant bg-surface-container hover:bg-surface-dim transition-all btn-press text-center">
          取消
        </a>
        <button class="flex-[2] bg-primary text-white py-5 rounded-2xl font-headline-md shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all btn-press flex items-center justify-center gap-2" onclick="alert('保存成功'); window.location.href='index.html';">
          <span class="material-symbols-outlined">save</span>
          保存账单
        </button>
      </div>
    </section>
  </main>

  <script>
    let currentAmount = "0.00";
    const display = document.getElementById('amount-display');

    function appendNum(num) {
      if (currentAmount === "0.00") {
        currentAmount = num === "." ? "0." : num;
      } else {
        if (num === "." && currentAmount.includes(".")) return;
        if (currentAmount.includes(".") && currentAmount.split(".")[1].length >= 2) return;
        currentAmount += num;
      }
      display.innerText = currentAmount;
    }

    function backspace() {
      if (currentAmount.length <= 1) {
        currentAmount = "0.00";
      } else {
        currentAmount = currentAmount.slice(0, -1);
        if (currentAmount.endsWith(".")) currentAmount = currentAmount.slice(0, -1);
        if (currentAmount === "") currentAmount = "0.00";
      }
      display.innerText = currentAmount;
    }

    function clearAll() {
      currentAmount = "0.00";
      display.innerText = currentAmount;
    }

    // Tab switching
    const expenseBtn = document.getElementById('tab-expense');
    const incomeBtn = document.getElementById('tab-income');
    expenseBtn.addEventListener('click', () => {
      expenseBtn.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
      expenseBtn.classList.remove('text-on-surface-variant');
      incomeBtn.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
      incomeBtn.classList.add('text-on-surface-variant');
    });
    incomeBtn.addEventListener('click', () => {
      incomeBtn.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
      incomeBtn.classList.remove('text-on-surface-variant');
      expenseBtn.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
      expenseBtn.classList.add('text-on-surface-variant');
    });

    // Category selection
    document.querySelectorAll('.category-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.category-chip').forEach(b => {
          b.classList.remove('active', 'bg-primary-container', 'text-on-primary-container');
          b.classList.add('bg-background-blush', 'text-on-surface-variant');
        });
        btn.classList.add('active');
        btn.classList.remove('bg-background-blush', 'text-on-surface-variant');
      });
    });
  </script>
</body>
</html>
