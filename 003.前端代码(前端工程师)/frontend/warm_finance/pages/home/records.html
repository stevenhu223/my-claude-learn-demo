  <script src="../../js/api.js"></script>
  <script>
    let currentFilter = 'all';
    let searchKeyword = '';
    let allRecords = [];
    let currentOffset = 0;
    let hasMoreRecords = true;
    const PAGE_SIZE = 10;

    // 图标映射
    const iconMap = {
      'restaurant': '🍜', 'directions_car': '🚌', 'shopping_bag': '🛒', 'home': '🏠',
      'checkroom': '👔', 'styler': '🎬', 'medical_services': '💊', 'school': '📚',
      'smartphone': '📱', 'favorite': '❤️', 'more_horiz': '📌', 'payments': '💰',
      'card_giftcard': '🎁', 'trending_up': '📈', 'work': '💼', 'storefront': '🏪',
      'handyman': '🔧', 'paid': '💵', 'account_balance_wallet': '💳', 'qr_code': '📱',
      'credit_card': '💳', 'account_balance': '🏦'
    };

    function getIcon(iconName) {
      return iconMap[iconName] || '📌';
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
      return {
        monthDay: `${month}月${day}日`,
        weekday: weekdays[date.getDay()]
      };
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr);
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return `${hours}:${minutes}`;
    }

    function setFilter(filter) {
      currentFilter = filter;
      currentOffset = 0;
      hasMoreRecords = true;

      document.querySelectorAll('[id^="tab-"]').forEach(btn => {
        if (!btn.id.includes('income')) {
          btn.classList.remove('bg-primary', 'text-white');
          btn.classList.add('bg-white', 'text-on-surface-variant');
        }
      });

      const activeTab = document.getElementById(`tab-${filter}`);
      if (activeTab) {
        activeTab.classList.remove('bg-white', 'text-on-surface-variant');
        activeTab.classList.add('bg-primary', 'text-white');
      }

      loadRecords(true);
    }

    function onSearch() {
      searchKeyword = document.getElementById('search-input').value.toLowerCase();
      currentOffset = 0;
      hasMoreRecords = true;
      loadRecords(true);
    }

    async function loadRecords(reset = false) {
      if (reset) {
        currentOffset = 0;
        allRecords = [];
      }

      const container = document.getElementById('records-list');

      if (reset) {
        container.innerHTML = `
          <div class="text-center py-12 text-on-surface-variant">
            <span class="material-symbols-outlined text-4xl mb-2">loading</span>
            <p>加载中...</p>
          </div>
        `;
      }

      try {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const startDate = `${year}-${String(month).padStart(2, '0')}-01`;
        const endDate = new Date(year, month, 0).toISOString().split('T')[0];

        const params = {
          startDate: startDate,
          endDate: endDate,
          limit: PAGE_SIZE,
          offset: currentOffset
        };

        if (currentFilter === 'expense') {
          params.type = 1;
        } else if (currentFilter === 'income') {
          params.type = 2;
        }

        const data = await RecordsAPI.getRecords(params);

        if (data.code === 200) {
          // Java后端直接返回数组
          const newRecords = data.data || [];

          if (reset) {
            allRecords = newRecords;
          } else {
            allRecords = [...allRecords, ...newRecords];
          }

          // Java后端没有返回总数，通过数据长度判断是否有更多
          hasMoreRecords = newRecords.length >= PAGE_SIZE;
          currentOffset += newRecords.length;

          updateSummary();
          renderRecords();
          updateLoadMoreButton();
        }
      } catch (error) {
        console.error('Load records error:', error);
        container.innerHTML = `
          <div class="text-center py-12 text-error">
            <span class="material-symbols-outlined text-4xl mb-2">error</span>
            <p>加载失败，请刷新重试</p>
          </div>
        `;
      }
    }

    function loadMore() {
      loadRecords(false);
    }

    function updateLoadMoreButton() {
      const loadMoreContainer = document.getElementById('load-more-container');
      if (hasMoreRecords && allRecords.length > 0) {
        loadMoreContainer.classList.remove('hidden');
      } else {
        loadMoreContainer.classList.add('hidden');
      }
    }

    function updateSummary() {
      let totalExpense = 0;
      let totalIncome = 0;

      // 使用allRecords计算汇总（不受筛选影响）
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const startDate = `${year}-${String(month).padStart(2, '0')}-01`;
      const endDate = new Date(year, month, 0).toISOString().split('T')[0];

      // 重新获取当月所有数据用于汇总
      RecordsAPI.getRecords({
        startDate: startDate,
        endDate: endDate,
        limit: 1000
      }).then(data => {
        if (data.code === 200) {
          // Java后端直接返回数组
          const records = data.data || [];
          let exp = 0, inc = 0;
          records.forEach(r => {
            if (r.type === 1) exp += parseFloat(r.amount);
            else inc += parseFloat(r.amount);
          });
          const bal = inc - exp;
          document.getElementById('month-expense').textContent = `¥${exp.toFixed(2)}`;
          document.getElementById('month-income').textContent = `¥${inc.toFixed(2)}`;
          const balanceEl = document.getElementById('month-balance');
          balanceEl.textContent = `¥${bal.toFixed(2)}`;
          balanceEl.classList.remove('text-error', 'text-income-green');
          balanceEl.classList.add(bal >= 0 ? 'text-income-green' : 'text-error');
        }
      });
    }

    function renderRecords() {
      const container = document.getElementById('records-list');

      let filteredRecords = [...allRecords];

      // 搜索过滤
      if (searchKeyword) {
        filteredRecords = filteredRecords.filter(r =>
          (r.remark && r.remark.toLowerCase().includes(searchKeyword)) ||
          (r.category_name && r.category_name.toLowerCase().includes(searchKeyword)) ||
          (r.payment_method_name && r.payment_method_name.toLowerCase().includes(searchKeyword))
        );
      }

      if (filteredRecords.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 text-on-surface-variant">
            <span class="material-symbols-outlined text-4xl mb-2">receipt_long</span>
            <p>暂无记录</p>
          </div>
        `;
        return;
      }

      // 按日期分组
      const groupedRecords = {};
      filteredRecords.forEach(record => {
        const dateKey = record.record_date;
        if (!groupedRecords[dateKey]) {
          groupedRecords[dateKey] = [];
        }
        groupedRecords[dateKey].push(record);
      });

      const sortedDates = Object.keys(groupedRecords).sort((a, b) => new Date(b) - new Date(a));

      let html = '';
      sortedDates.forEach(dateKey => {
        const records = groupedRecords[dateKey];
        const dateInfo = formatDate(dateKey);

        let dayExpense = 0;
        let dayIncome = 0;
        records.forEach(r => {
          if (r.type === 1) dayExpense += parseFloat(r.amount);
          else dayIncome += parseFloat(r.amount);
        });

        html += `
          <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="px-4 py-3 border-b border-outline-variant/10 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <span class="text-lg font-bold text-primary">${dateInfo.monthDay.replace('月', '')}</span>
                <div class="flex flex-col">
                  <span class="text-xs font-medium text-on-surface">${dateInfo.monthDay}</span>
                  <span class="text-xs text-outline">${dateInfo.weekday}</span>
                </div>
              </div>
              <div class="text-right flex gap-3">
                ${dayExpense > 0 ? `<div><span class="text-xs text-outline block">支出</span><span class="font-bold text-error">¥${dayExpense.toFixed(2)}</span></div>` : ''}
                ${dayIncome > 0 ? `<div><span class="text-xs text-outline block">收入</span><span class="font-bold text-income-green">¥${dayIncome.toFixed(2)}</span></div>` : ''}
              </div>
            </div>
            ${records.map((record, idx) => {
              const icon = getIcon(record.category_icon);
              const time = formatTime(record.created_at);
              const amount = parseFloat(record.amount);
              const isExpense = record.type === 1;
              const amountColor = isExpense ? 'text-error' : 'text-income-green';
              const amountPrefix = isExpense ? '-' : '+';
              const bgColor = isExpense ? 'bg-error/5' : 'bg-income-green/5';
              const borderColor = isExpense ? 'border-l-error' : 'border-l-income-green';

              return `
                <div class="flex items-center gap-4 p-4 hover:bg-background-blush transition-colors border-b border-outline-variant/5 ${borderColor} border-l-2 ${idx === records.length - 1 ? 'border-b-0' : ''}">
                  <div class="w-12 h-12 rounded-xl ${bgColor} flex items-center justify-center shrink-0">
                    <span class="text-2xl">${icon}</span>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="font-medium text-on-surface">${record.category_name || '未分类'}${record.remark ? ' - ' + record.remark : ''}</p>
                    <div class="flex items-center gap-2 mt-1">
                      <span class="text-xs px-2 py-0.5 rounded-full ${bgColor} text-on-surface-variant">${record.category_name || '未分类'}</span>
                      ${record.payment_method_name ? `<span class="text-xs text-outline">${record.payment_method_name}</span>` : ''}
                      <span class="text-xs text-outline">${time}</span>
                    </div>
                  </div>
                  <span class="font-bold ${amountColor} shrink-0">${amountPrefix}¥${amount.toFixed(2)}</span>
                </div>
              `;
            }).join('')}
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function exportToExcel() {
      if (allRecords.length === 0) {
        alert('暂无数据可导出');
        return;
      }

      // 准备导出数据
      const exportData = allRecords.map(record => {
        const dateInfo = formatDate(record.record_date);
        return {
          '日期': record.record_date,
          '时间': formatTime(record.created_at),
          '类型': record.type === 1 ? '支出' : '收入',
          '分类': record.category_name || '未分类',
          '金额': record.type === 1 ? -parseFloat(record.amount) : parseFloat(record.amount),
          '支付方式': record.payment_method_name || '-',
          '备注': record.remark || '-'
        };
      });

      const ws = XLSX.utils.json_to_sheet(exportData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '流水记录');

      const now = new Date();
      const filename = `财务管家_流水记录_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}.xlsx`;
      XLSX.writeFile(wb, filename);
    }

    // 菜单功能
    const menu = document.getElementById('sideMenu');
    const overlay = document.getElementById('overlay');

    function openMenu() {
      menu.classList.add('open');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
      menu.classList.remove('open');
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.squishy-active').forEach(btn => {
      btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
      btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
      btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
    });

    function updateUserInfo() {
      const user = AuthAPI.getUser();
      if (user) {
        const nickname = user.nickname || user.username || '用户';
        const firstChar = nickname.charAt(0).toUpperCase();

        const sidebarName = document.querySelector('#sideMenu .font-semibold.text-on-surface');
        if (sidebarName) sidebarName.textContent = nickname;

        const sidebarAvatar = document.querySelector('#sideMenu .bg-primary-container span');
        if (sidebarAvatar) sidebarAvatar.textContent = firstChar;

        const headerName = document.querySelector('header a[href="mine.html"] .font-medium.text-on-surface');
        if (headerName) headerName.textContent = nickname;

        const headerAvatar = document.querySelector('header .bg-primary-container .font-semibold');
        if (headerAvatar) headerAvatar.textContent = firstChar;

        const mobileAvatar = document.querySelector('header .rounded-full.bg-primary-container .font-semibold');
        if (mobileAvatar) mobileAvatar.textContent = firstChar;
      }
    }

    async function handleLogout() {
      await AuthAPI.logout();
      window.location.href = '../auth/login.html';
    }

    // 页面初始化
    function initPage() {
      updateUserInfo();
      loadRecords(true);
    }

    // 确保 AuthAPI 加载后初始化页面
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPage);
    } else {
      initPage();
    }
  </script>
</body>
</html>
