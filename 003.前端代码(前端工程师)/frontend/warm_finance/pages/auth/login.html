<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>登录 - 财务管家</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#944652",
            "primary-container": "#ff9eaa",
            "on-primary-container": "#7a323e",
            "income-green": "#7DD87D",
            "surface-white": "#FFFFFF",
            "background-blush": "#FFF5F7",
            "text-secondary": "#999999",
            "on-surface": "#1b1c1c",
            "on-surface-variant": "#534344",
            "outline-variant": "#d9c1c2"
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #FFF5F7; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .gradient-brand { background: linear-gradient(135deg, #FFF5F7 0%, #FF9EAA 100%); }
    .squishy-active:active { transform: scale(0.98); }
    .soft-glow-focus:focus-within { box-shadow: 0 0 0 4px rgba(255, 158, 170, 0.1); }
  </style>
</head>
<body class="min-h-screen selection:bg-primary-container selection:text-on-primary-container">
  <div class="flex flex-col lg:flex-row min-h-screen">
    <!-- Left Side: Branding -->
    <section class="lg:w-1/2 gradient-brand flex flex-col items-center justify-center p-12 relative overflow-hidden">
      <div class="absolute top-0 left-0 w-64 h-64 bg-white/20 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 animate-pulse"></div>
      <div class="absolute bottom-0 right-0 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl translate-x-1/3 translate-y-1/3 animate-pulse" style="animation-delay: 1s;"></div>
      <div class="relative z-10 text-center">
        <div class="w-24 h-24 lg:w-32 lg:h-32 bg-white rounded-3xl flex items-center justify-center shadow-[0_20px_50px_rgba(148,70,82,0.15)] mx-auto mb-8">
          <span class="material-symbols-outlined text-[48px] lg:text-[64px] text-primary" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
        </div>
        <h1 class="font-display-lg text-4xl lg:text-5xl text-on-surface mb-4">财务管家</h1>
        <p class="font-body-md text-lg opacity-70 max-w-md mx-auto leading-relaxed">遇见更有温度的理财生活<br>让每一分钱都有它温柔的归宿</p>
      </div>
      <div class="absolute bottom-12 text-center hidden lg:block">
        <p class="text-sm opacity-40">© 2024 财务管家</p>
      </div>
    </section>

    <!-- Right Side: Login Form -->
    <section class="lg:w-1/2 bg-white flex flex-col items-center justify-center p-8 md:p-16 lg:p-24">
      <main class="w-full max-w-[440px]">
        <!-- Mobile Logo -->
        <div class="lg:hidden flex flex-col items-center mb-12">
          <div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center shadow-lg mb-4">
            <span class="material-symbols-outlined text-[32px] text-white" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
          </div>
          <h2 class="font-headline-md text-on-surface">财务管家</h2>
        </div>

        <div class="mb-10">
          <h2 class="font-display-lg text-2xl lg:text-3xl text-on-surface tracking-tight">欢迎回来</h2>
          <p class="font-body-md text-on-surface-variant/60 mt-2">请登录您的账户以管理您的财务</p>
        </div>

        <!-- 错误提示 -->
        <div id="errorMessage" class="hidden mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm"></div>

        <form class="space-y-6" id="loginForm">
          <div class="space-y-2">
            <label class="font-label-sm text-on-surface-variant font-semibold tracking-wide uppercase">用户名</label>
            <div class="relative group soft-glow-focus rounded-xl">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-on-surface-variant/40 text-[20px]">person</span>
              </div>
              <input id="username" class="w-full pl-11 pr-4 py-4 bg-surface-container-low border border-transparent focus:border-primary-container focus:bg-white rounded-xl font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30 transition-all outline-none" placeholder="请输入用户名" type="text" required>
            </div>
          </div>

          <div class="space-y-2">
            <label class="font-label-sm text-on-surface-variant font-semibold tracking-wide uppercase">登录密码</label>
            <div class="relative group soft-glow-focus rounded-xl">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-on-surface-variant/40 text-[20px]">lock</span>
              </div>
              <input id="password" class="w-full pl-11 pr-11 py-4 bg-surface-container-low border border-transparent focus:border-primary-container focus:bg-white rounded-xl font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30 transition-all outline-none" placeholder="请输入您的密码" type="password" required>
              <button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant/40 hover:text-primary transition-colors" type="button" onclick="togglePassword()">
                <span id="eyeIcon" class="material-symbols-outlined text-[20px]">visibility</span>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between py-2">
            <label class="flex items-center gap-2 cursor-pointer group">
              <input id="rememberMe" class="w-5 h-5 border border-outline-variant rounded-md checked:bg-primary-container checked:border-primary-container transition-all cursor-pointer" type="checkbox">
              <span class="font-label-sm text-on-surface-variant group-hover:text-primary transition-colors">记住我</span>
            </label>
            <a class="font-label-sm text-primary font-semibold hover:text-on-primary-container transition-all" href="reset-password.html">忘记密码？</a>
          </div>

          <button id="submitBtn" class="squishy-active w-full py-4 bg-primary-container text-white font-title-sm text-title-sm rounded-xl shadow-[0_10px_25px_rgba(255,158,170,0.4)] hover:shadow-[0_15px_30px_rgba(255,158,170,0.5)] transition-all mt-4 flex items-center justify-center gap-2" type="submit">
            <span id="btnText">立即登录</span>
            <span id="loadingSpinner" class="hidden">
              <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 0 12h4zm2 5.196V12a8.196 8.196 0 01-.196-2z"></path>
              </svg>
            </span>
          </button>

          <div class="pt-8 text-center">
            <p class="font-label-sm text-on-surface-variant/60">
              还没有账号？
              <a class="text-primary font-bold hover:underline ml-1" href="register.html">立即注册</a>
            </p>
          </div>
        </form>
      </main>
    </section>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-white shadow-lg z-9999 transition-all opacity-0 pointer-events-none"></div>

  <script src="../../js/api.js"></script>
  <script>
    // 检查是否已登录
    if (AuthAPI.isLoggedIn()) {
      window.location.href = '../home/index.html';
    }

    // 密码可见性切换
    function togglePassword() {
      const pwdInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        eyeIcon.textContent = 'visibility_off';
      } else {
        pwdInput.type = 'password';
        eyeIcon.textContent = 'visibility';
      }
    }

    // 显示提示
    function showToast(message, type = 'error') {
      const toast = document.getElementById('toast');
      const colors = {
        success: 'bg-income-green',
        error: 'bg-red-500',
        info: 'bg-primary-container'
      };
      toast.className = `fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-white shadow-lg z-9999 transition-all opacity-100 ${colors[type]}`;
      toast.textContent = message;
      toast.classList.remove('opacity-0', 'pointer-events-none');

      setTimeout(() => {
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 3000);
    }

    // 显示错误
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.classList.remove('hidden');
    }

    // 隐藏错误
    function hideError() {
      document.getElementById('errorMessage').classList.add('hidden');
    }

    // 登录表单提交
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const loadingSpinner = document.getElementById('loadingSpinner');

      // 简单验证
      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }

      // 显示加载状态
      submitBtn.disabled = true;
      btnText.textContent = '登录中...';
      loadingSpinner.classList.remove('hidden');

      try {
        const data = await AuthAPI.login(username, password);

        if (data.code === 200) {
          showToast('登录成功！', 'success');
          setTimeout(() => {
            window.location.href = '../home/index.html';
          }, 500);
        } else {
          showError(data.message || '登录失败');
        }
      } catch (error) {
        showError(error.message || '网络错误，请检查后端服务是否启动');
      } finally {
        submitBtn.disabled = false;
        btnText.textContent = '立即登录';
        loadingSpinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
