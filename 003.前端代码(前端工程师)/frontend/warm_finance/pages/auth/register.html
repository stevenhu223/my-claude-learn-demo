<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>注册 - 财务管家</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#944652",
            "primary-container": "#ff9eaa",
            "primary-fixed": "#ffd9dc",
            "on-primary-container": "#7a323e",
            "income-green": "#7DD87D",
            "surface-white": "#FFFFFF",
            "background-blush": "#FFF5F7",
            "text-secondary": "#999999",
            "on-surface": "#1b1c1c",
            "on-surface-variant": "#534344",
            "outline-variant": "#d9c1c2",
            "surface-container-low": "#f5f3f3"
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #fbf9f8; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .soft-gradient-bg { background: radial-gradient(circle at 10% 20%, rgba(255, 245, 247, 1) 0%, rgba(251, 249, 248, 1) 90%); }
    .floating-bubble { position: absolute; border-radius: 50%; background: #FF9EAA; opacity: 0.05; z-index: 0; pointer-events: none; }
  </style>
</head>
<body class="soft-gradient-bg min-h-screen flex flex-col relative overflow-hidden">
  <!-- Background Decorations -->
  <div class="floating-bubble w-64 h-64 -top-20 -left-20 animate-pulse"></div>
  <div class="floating-bubble w-96 h-96 -bottom-32 -right-32 animate-pulse" style="animation-delay: 2s;"></div>

  <!-- Header -->
  <header class="w-full h-16 bg-surface-white/80 backdrop-blur-md shadow-sm z-50">
    <div class="flex justify-between items-center px-margin-mobile max-w-7xl mx-auto h-full">
      <div class="font-display-lg text-display-lg text-primary flex items-center gap-2">
        <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
        财务管家
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="flex-grow flex items-center justify-center px-margin-mobile py-stack-lg relative z-10">
    <div class="w-full max-w-[480px]">
      <div class="bg-surface-white rounded-[24px] p-8 md:p-10 shadow-[0_8px_30px_rgba(255,158,170,0.12)] border border-primary-fixed/30">
        <!-- 错误提示 -->
        <div id="errorMessage" class="hidden mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm"></div>

        <div class="text-center mb-8">
          <div class="inline-flex p-4 bg-primary-fixed rounded-full mb-4">
            <span class="material-symbols-outlined text-primary text-4xl">person_add</span>
          </div>
          <h1 class="font-headline-md text-headline-md text-on-surface mb-2">注册到财务管家</h1>
          <p class="font-body-md text-body-md text-on-surface-variant">开始您的轻松财务管理之旅</p>
        </div>

        <form class="space-y-6" id="registerForm">
          <div class="space-y-1.5">
            <label class="font-label-sm text-on-surface-variant ml-1">用户名</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">person</span>
              <input id="username" class="w-full h-[52px] pl-12 pr-4 bg-surface-container-low border-transparent focus:border-secondary-container rounded-[16px] font-body-md transition-all placeholder:text-text-secondary" placeholder="请输入用户名（3-20个字符）" type="text" required>
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="font-label-sm text-on-surface-variant ml-1">昵称（选填）</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">badge</span>
              <input id="nickname" class="w-full h-[52px] pl-12 pr-4 bg-surface-container-low border-transparent focus:border-secondary-container rounded-[16px] font-body-md transition-all placeholder:text-text-secondary" placeholder="请输入昵称（不填则使用用户名）" type="text">
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="font-label-sm text-on-surface-variant ml-1">设置密码</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
              <input id="password" class="w-full h-[52px] pl-12 pr-12 bg-surface-container-low border-transparent focus:border-secondary-container rounded-[16px] font-body-md transition-all placeholder:text-text-secondary" placeholder="建议包含字母与数字" type="password" required>
              <button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 hover:text-primary transition-colors" type="button" onclick="togglePassword('password', 'eyeIcon1')">
                <span id="eyeIcon1" class="material-symbols-outlined text-[20px]">visibility</span>
              </button>
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="font-label-sm text-on-surface-variant ml-1">确认密码</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">verified_user</span>
              <input id="confirmPassword" class="w-full h-[52px] pl-12 pr-12 bg-surface-container-low border-transparent focus:border-secondary-container rounded-[16px] font-body-md transition-all placeholder:text-text-secondary" placeholder="请再次输入密码" type="password" required>
              <button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 hover:text-primary transition-colors" type="button" onclick="togglePassword('confirmPassword', 'eyeIcon2')">
                <span id="eyeIcon2" class="material-symbols-outlined text-[20px]">visibility</span>
              </button>
            </div>
          </div>

          <div class="flex items-start gap-3 mt-4">
            <input id="terms" class="w-5 h-5 rounded-[6px] border-outline-variant text-primary" type="checkbox" required>
            <label class="font-label-sm text-on-surface-variant cursor-pointer select-none leading-tight" for="terms">
              我已阅读并同意 <a class="text-primary hover:underline" href="#">用户协议</a> 和 <a class="text-primary hover:underline" href="#">隐私政策</a>
            </label>
          </div>

          <button id="submitBtn" class="w-full h-[56px] bg-primary-container text-on-primary font-title-sm rounded-[20px] shadow-[0_4px_12px_rgba(255,158,170,0.3)] hover:brightness-105 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
            <span id="btnText">开启智慧理财之旅</span>
            <span id="loadingSpinner" class="hidden">
              <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 0 12h4zm2 5.196V12a8.196 8.196 0 01-.196-2z"></path>
              </svg>
            </span>
            <span class="material-symbols-outlined" id="arrowIcon">arrow_forward</span>
          </button>
        </form>

        <div class="mt-8 text-center">
          <p class="font-body-md text-body-md text-on-surface-variant">
            已有账号？
            <a class="text-primary font-bold hover:underline ml-1" href="login.html">去登录</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast 提示 -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-white shadow-lg z-9999 transition-all opacity-0 pointer-events-none"></div>

  <footer class="w-full py-stack-lg bg-surface-container-low/50 backdrop-blur-sm mt-auto">
    <div class="max-w-7xl mx-auto px-margin-mobile text-center">
      <p class="font-label-sm text-label-sm text-on-surface-variant">© 2024 财务管家</p>
    </div>
  </footer>

  <script src="../../js/api.js"></script>
  <script>
    // 密码可见性切换
    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    }

    // 显示提示
    function showToast(message, type = 'error') {
      const toast = document.getElementById('toast');
      const colors = {
        success: 'bg-income-green',
        error: 'bg-red-500',
        info: 'bg-primary-container'
      };
      toast.className = `fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-white shadow-lg z-9999 transition-all opacity-100 ${colors[type]}`;
      toast.textContent = message;
      toast.classList.remove('opacity-0', 'pointer-events-none');

      setTimeout(() => {
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 3000);
    }

    // 显示错误
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.classList.remove('hidden');
    }

    // 隐藏错误
    function hideError() {
      document.getElementById('errorMessage').classList.add('hidden');
    }

    // 注册表单提交
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const nickname = document.getElementById('nickname').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const terms = document.getElementById('terms').checked;

      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const loadingSpinner = document.getElementById('loadingSpinner');
      const arrowIcon = document.getElementById('arrowIcon');

      // 验证用户名
      const usernameError = Utils.validateUsername(username);
      if (usernameError) {
        showError(usernameError);
        return;
      }

      // 验证密码
      const passwordError = Utils.validatePassword(password);
      if (passwordError) {
        showError(passwordError);
        return;
      }

      // 验证确认密码
      if (password !== confirmPassword) {
        showError('两次输入的密码不一致');
        return;
      }

      // 验证协议
      if (!terms) {
        showError('请阅读并同意用户协议和隐私政策');
        return;
      }

      // 显示加载状态
      submitBtn.disabled = true;
      btnText.textContent = '注册中...';
      loadingSpinner.classList.remove('hidden');
      arrowIcon.classList.add('hidden');

      try {
        const data = await AuthAPI.register(username, password, nickname || username);

        if (data.code === 201) {
          showToast('注册成功！即将跳转登录...', 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1000);
        } else {
          showError(data.message || '注册失败');
        }
      } catch (error) {
        showError(error.message || '网络错误，请检查后端服务是否启动');
      } finally {
        submitBtn.disabled = false;
        btnText.textContent = '开启智慧理财之旅';
        loadingSpinner.classList.add('hidden');
        arrowIcon.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
