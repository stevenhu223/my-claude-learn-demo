<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>注册 - 财务管家</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#944652",
            "primary-container": "#ff9eaa",
            "primary-fixed": "#ffd9dc",
            "on-primary-container": "#7a323e",
            "income-green": "#7DD87D",
            "surface-white": "#FFFFFF",
            "background-blush": "#FFF5F7",
            "text-secondary": "#999999",
            "on-surface": "#1b1c1c",
            "on-surface-variant": "#534344",
            "outline-variant": "#d9c1c2",
            "surface-container-low": "#f5f3f3"
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #fbf9f8; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .soft-gradient-bg { background: radial-gradient(circle at 10% 20%, rgba(255, 245, 247, 1) 0%, rgba(251, 249, 248, 1) 90%); }
    .floating-bubble { position: absolute; border-radius: 50%; background: #FF9EAA; opacity: 0.05; z-index: 0; pointer-events: none; }
  </style>
</head>
<body class="soft-gradient-bg min-h-screen flex flex-col relative overflow-hidden">
  <!-- Background Decorations -->
  <div class="floating-bubble w-64 h-64 -top-20 -left-20 animate-pulse"></div>
  <div class="floating-bubble w-96 h-96 -bottom-32 -right-32 animate-pulse" style="animation-delay: 2s;"></div>

  <!-- Header -->
  <header class="w-full h-16 bg-surface-white/80 backdrop-blur-md shadow-sm z-50">
    <div class="flex justify-between items-center px-margin-mobile max-w-7xl mx-auto h-full">
      <div class="font-display-lg text-display-lg text-primary flex items-center gap-2">
        <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
        财务管家
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="flex-grow flex items-center justify-center px-margin-mobile py-stack-lg relative z-10">
    <div class="w-full max-w-[480px]">
      <div class="bg-surface-white rounded-[24px] p-8 md:p-10 shadow-[0_8px_30px_rgba(255,158,170,0.12)] border border-primary-fixed/30">
        <div class="text-center mb-8">
          <div class="inline-flex p-4 bg-primary-fixed rounded-full mb-4">
            <span class="material-symbols-outlined text-primary text-4xl">person_add</span>
          </div>
          <h1 class="font-headline-md text-headline-md text-on-surface mb-2">注册到财务管家</h1>
          <p class="font-body-md text-body-md text-on-surface-variant">开始您的轻松财务管理之旅</p>
        </div>

        <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='login.html';">
          <div class="space-y-1.5">
            <label class="font-label-sm text-on-surface-variant ml-1">用户名</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">person</span>
              <input class="w-full h-[52px] pl-12 pr-4 bg-surface-container-low border-transparent focus:border-secondary-container rounded-[16px] font-body-md transition-all placeholder:text-text-secondary" placeholder="请输入用户名" type="text" required>
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="font-label-sm text-on-surface-variant ml-1">设置密码</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
              <input class="w-full h-[52px] pl-12 pr-4 bg-surface-container-low border-transparent focus:border-secondary-container rounded-[16px] font-body-md transition-all placeholder:text-text-secondary" placeholder="建议包含字母与数字" type="password" required>
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="font-label-sm text-on-surface-variant ml-1">确认密码</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">verified_user</span>
              <input class="w-full h-[52px] pl-12 pr-4 bg-surface-container-low border-transparent focus:border-secondary-container rounded-[16px] font-body-md transition-all placeholder:text-text-secondary" placeholder="请再次输入密码" type="password" required>
            </div>
          </div>

          <div class="flex items-start gap-3 mt-4">
            <input class="w-5 h-5 rounded-[6px] border-outline-variant text-primary" id="terms" type="checkbox" required>
            <label class="font-label-sm text-on-surface-variant cursor-pointer select-none leading-tight" for="terms">
              我已阅读并同意 <a class="text-primary hover:underline" href="#">用户协议</a> 和 <a class="text-primary hover:underline" href="#">隐私政策</a>
            </label>
          </div>

          <button class="w-full h-[56px] bg-primary-container text-on-primary font-title-sm rounded-[20px] shadow-[0_4px_12px_rgba(255,158,170,0.3)] hover:brightness-105 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
            开启智慧理财之旅
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </form>

        <div class="mt-8 text-center">
          <p class="font-body-md text-body-md text-on-surface-variant">
            已有账号？
            <a class="text-primary font-bold hover:underline ml-1" href="login.html">去登录</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <footer class="w-full py-stack-lg bg-surface-container-low/50 backdrop-blur-sm mt-auto">
    <div class="max-w-7xl mx-auto px-margin-mobile text-center">
      <p class="font-label-sm text-label-sm text-on-surface-variant">© 2024 财务管家</p>
    </div>
  </footer>
</body>
</html>
