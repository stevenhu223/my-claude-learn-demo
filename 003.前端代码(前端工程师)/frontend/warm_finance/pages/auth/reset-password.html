<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>重置密码 - 财务管家</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#944652",
            "primary-container": "#ff9eaa",
            "on-primary": "#ffffff",
            "on-primary-container": "#7a323e",
            "income-green": "#7DD87D",
            "surface-white": "#FFFFFF",
            "background-blush": "#FFF5F7",
            "text-secondary": "#999999",
            "on-surface": "#1b1c1c",
            "on-surface-variant": "#534344",
            "outline-variant": "#d9c1c2",
            "secondary-container": "#ffb6c1"
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Be Vietnam Pro', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .soft-gradient { background: linear-gradient(135deg, #FF9EAA 0%, #FFD9DC 100%); }
    .squishy-button { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .squishy-button:active { transform: scale(0.96); }
    .floating-blob { animation: float 8s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
  </style>
</head>
<body class="bg-background-blush min-h-screen flex items-center justify-center font-body-md text-on-surface">
  <main class="w-full max-w-[1200px] flex overflow-hidden rounded-[32px] shadow-2xl bg-surface-white mx-4 my-8">
    <!-- Left Side: Brand -->
    <section class="hidden md:flex flex-col w-1/2 soft-gradient p-16 relative overflow-hidden items-center justify-center text-center">
      <div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-white/20 rounded-full blur-3xl floating-blob"></div>
      <div class="absolute bottom-[-5%] right-[-5%] w-80 h-80 bg-white/10 rounded-full blur-2xl floating-blob" style="animation-delay: -2s;"></div>
      <div class="relative z-10 flex flex-col items-center">
        <div class="w-24 h-24 bg-white rounded-[24px] flex items-center justify-center shadow-lg mb-8">
          <span class="material-symbols-outlined text-primary text-[48px]" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
        </div>
        <h1 class="font-display-lg text-display-lg text-on-primary-container mb-4 tracking-tight leading-tight">财务管家</h1>
        <p class="font-headline-md text-headline-md text-on-primary-container/80 max-w-[320px] leading-relaxed tracking-wide">找回您的财务钥匙<br>让每一分钱重回视野</p>
      </div>
      <div class="absolute bottom-8 text-on-primary-container/60 font-label-sm text-label-sm">© 2024 财务管家</div>
    </section>

    <!-- Right Side: Form -->
    <section class="w-full md:w-1/2 p-8 md:p-20 flex flex-col justify-center bg-surface-white">
      <div class="max-w-[400px] mx-auto w-full">
        <div class="mb-10">
          <h2 class="font-display-lg text-display-lg text-on-surface mb-3">重置密码</h2>
          <p class="text-on-surface-variant font-body-md">请输入您的注册手机号，我们将发送验证码以找回您的账户</p>
        </div>

        <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='verify.html';">
          <div class="space-y-2">
            <label class="font-label-sm text-on-surface-variant ml-1" for="account">手机号/用户名</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-[20px]">person</span>
              </div>
              <input class="block w-full pl-11 pr-4 py-4 bg-surface-container-low border-2 border-transparent focus:border-secondary-container focus:bg-white rounded-[16px] transition-all outline-none font-body-md" id="account" placeholder="请输入您的手机号或用户名" type="text" required>
            </div>
          </div>

          <button class="squishy-button w-full bg-primary-container hover:bg-[#FF8A99] text-on-primary font-title-sm py-4 rounded-[20px] transition-colors flex items-center justify-center gap-2" type="submit">
            发送验证码
            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
          </button>
        </form>

        <div class="mt-12 text-center">
          <a class="inline-flex items-center gap-2 text-primary hover:text-secondary font-title-sm transition-all" href="login.html">
            <span class="material-symbols-outlined text-[20px]">login</span>
            想起密码了？立即登录
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
